<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Tattoo needle/pen cursor pointing top-left -->
  <!-- Needle body -->
  <g transform="rotate(-45, 16, 16)">
    <!-- Handle grip -->
    <rect x="13" y="2" width="6" height="10" rx="2" fill="#1e293b" stroke="#e11d48" stroke-width="1"/>
    <!-- Grip lines -->
    <line x1="13" y1="5" x2="19" y2="5" stroke="#e11d48" stroke-width="0.8" opacity="0.6"/>
    <line x1="13" y1="7" x2="19" y2="7" stroke="#e11d48" stroke-width="0.8" opacity="0.6"/>
    <line x1="13" y1="9" x2="19" y2="9" stroke="#e11d48" stroke-width="0.8" opacity="0.6"/>
    <!-- Barrel -->
    <rect x="14" y="12" width="4" height="12" rx="1" fill="#0f172a" stroke="#e11d48" stroke-width="1"/>
    <!-- Needle tip taper -->
    <polygon points="14,24 18,24 16,31" fill="#e11d48"/>
    <!-- Ink drop at tip -->
    <circle cx="16" cy="31" r="1.2" fill="#e11d48" opacity="0.9"/>
  </g>
</svg>
