<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Clarity Tattoo</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, rgba(225,29,72,0.06) 0%, transparent 70%),
                  var(--bg-primary);
    }
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }
    .login-logo {
      text-align: center;
      color: var(--accent);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .login-tagline {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-logo">✦ Clarity Tattoo</div>
  <p class="login-tagline">Admin Portal — Secure Access</p>

  <div class="form-box">
    <h2 style="color:var(--text-primary);font-size:1.3rem;font-weight:700;margin-bottom:24px;text-align:center;">
      Sign In
    </h2>

    <form th:action="@{/admin/login}" method="post">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" name="username"
               class="form-control" placeholder="Enter username" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password"
               class="form-control" placeholder="Enter password" required>
      </div>

      <!-- Error message -->
      <div th:if="${error}"
           style="background:rgba(239,68,68,0.1);border:1px solid var(--danger);color:var(--danger);
                  padding:10px 14px;border-radius:8px;font-size:0.85rem;margin-bottom:16px;">
        ⚠️ <span th:text="${error}">Invalid credentials</span>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px;">
        Sign In →
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;">
      <a href="/" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;">
        ← Back to website
      </a>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
